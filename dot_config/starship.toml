"$schema" = 'https://starship.rs/config-schema.json'

command_timeout = 1000
scan_timeout = 30

format = "$directory$git_branch$git_status$cmd_duration$character"

palette = "oxocarbon"

[palettes.oxocarbon]
blue   = "#78a9ff"   # base09
cyan   = "#33b1ff"   # base0B
green  = "#42be65"   # base0D
pink   = "#ff7eb6"   # base0C
red    = "#ee5396"   # base0A
purple = "#be95ff"   # base0E
teal   = "#08bdba"   # base07
muted  = "#525252"   # base03

[directory]
format = "[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style) "
style = "bold fg:blue"
repo_root_style = "bold fg:blue"
before_repo_root_style = "fg:muted"
truncation_length = 10
truncate_to_repo = false
home_symbol = "~"


[git_branch]
format = "[$symbol$branch]($style) "
symbol = " "
style = "bold fg:red"
truncation_length = 24
truncation_symbol = "…"

[git_status]
format = "([$conflicted]($style) )"
style = "bold fg:pink"
conflicted = "~"

[fill]
symbol = " "

[cmd_duration]
format = "[ $duration]($style) "
style = "bold fg:green"
min_time = 2_000
show_milliseconds = false

[status]
disabled = true

[character]
success_symbol = "[❯](bold fg:blue)"
error_symbol   = "[❯](bold fg:red)"
vimcmd_symbol  = "[❮](bold fg:purple)"
